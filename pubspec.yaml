name: luqma_haneya
description: لقمة هنية — وصفات وتخطيط وجبات للمستخدمين في مصر
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Launcher icons: place your master PNG at assets/branding/app_icon.png (1024×1024 recommended),
  # then run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/recipes.json

# Replaces default Flutter launcher icons on Android and iOS.
# TODO: Replace assets/branding/app_icon.png with your final artwork (PNG, square, ≥1024px).
# Visual direction: warm Egyptian home food; simple plate/bowl; steam as smile/heart;
# colors: terracotta, cream, olive. Then run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true
